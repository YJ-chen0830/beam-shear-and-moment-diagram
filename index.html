<style>
  :root{ --navy:#0b1f3a; --navy2:#13284a; --gold:#c9a14a; --gold2:#e0bf6e; --bg:#f5f3ee; --ink:#1c2530; --line:#d8d2c2; }

  .card{background:#fff; border:1px solid var(--line); border-radius:10px; padding:20px 22px; margin-bottom:20px; box-shadow:0 1px 3px rgba(0,0,0,.04);}

  label{display:block; font-size:12.5px; color:#555; margin:10px 0 4px;}
  input,select{width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:14px; background:#fafaf8;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
  button{margin-top:10px; width:100%; padding:10px; border:none; border-radius:7px; background:var(--navy); color:#fff; font-size:14px; font-weight:600; cursor:pointer;}
  button:hover{background:var(--navy2);}
  button.secondary{background:#888;}
  .loadRow{border:1px solid var(--line); border-radius:8px; padding:10px; margin-top:10px; background:#fafaf8; position:relative;}
  .loadRow .del{position:absolute; right:8px; top:8px; background:#c0392b; color:#fff; border:none; width:22px; height:22px; border-radius:50%; cursor:pointer; font-size:12px; padding:0;}
  svg{width:100%; height:520px; background:#fff; border:1px solid var(--line); border-radius:8px;}
  .result{margin-top:16px; font-size:13.5px;}
  table{width:100%; border-collapse:collapse;}
  td{padding:5px 4px; border-bottom:1px solid #eee;}
  td:last-child{text-align:right; font-weight:600;}
  details.proc{margin-top:16px;border:1px solid var(--line);border-radius:8px;background:#fafaf8;overflow:hidden;}
  details.proc summary{cursor:pointer;padding:10px 14px;font-weight:700;font-size:13px;color:var(--navy);user-select:none;list-style:none;display:flex;align-items:center;gap:6px;}
  details.proc summary::before{content:"▶";font-size:10px;transition:transform .2s;}
  details[open].proc summary::before{transform:rotate(90deg);}
  details.proc pre{margin:0;padding:12px 16px 16px;font-family:"Courier New",monospace;font-size:11.5px;line-height:1.9;white-space:pre-wrap;color:#2c3e50;border-top:1px solid var(--line);}

    header,.no-print{display:none!important;}

    .card{box-shadow:none!important;border:1px solid #ccc!important;border-radius:4pt!important;padding:10pt 12pt!important;break-inside:avoid;}
    details.proc{display:block!important;margin-top:10pt!important;border:1pt solid #0b1f3a!important;border-radius:4pt!important;break-inside:avoid;background:#f9f9f6!important;}
    details.proc>summary{display:none!important;}
    details.proc::before{content:"📋  計算過程（供第三方檢核）";display:block;font-weight:700;font-size:8pt;color:#0b1f3a;padding:6pt 10pt 4pt;border-bottom:1px solid #ccc;letter-spacing:.04em;}
    details.proc>pre{font-size:7pt!important;line-height:1.65!important;white-space:pre-wrap!important;padding:6pt 10pt 10pt!important;color:#1a1a1a!important;font-family:"Courier New",monospace!important;}
    @page{margin:15mm 12mm;size:A4;}
    .proj-section{border:1.5pt solid #0b1f3a!important;border-radius:4pt!important;}
  }
  .proj-section{background:#fff;border:1px solid var(--gold);border-radius:10px;padding:18px 22px;margin-bottom:20px;}
  .proj-section h3{margin:0 0 12px;color:var(--navy);font-size:14px;font-weight:700;}
  .proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:600px){.proj-grid{grid-template-columns:1fr;}}
</style>
<script src="https://yj-chen0830.github.io/jrh-core/jrh-core.js?v=3" defer></script>
</head>
<body data-tool="bsm">
<header>
  <a href="https://yj-chen0830.github.io/engineering-hub/" style="color:var(--gold2);font-size:12.5px;text-decoration:none;display:inline-block;margin-bottom:8px;">← 返回工程計算中心</a>
  <h1>梁剪力彎矩圖 (Beam Shear &amp; Moment Diagram)</h1>
  <span>簡支梁 / 懸臂梁 · 點載重 + 均布載重 · 最大剪力/彎矩自動標示</span>
</header>

<main>

<div class="proj-section no-print" id="projSection">
  <h3>📁 專案資訊（列印時帶入計算書封面）</h3>
  <div class="proj-grid">
    <div><label>工程名稱</label><input id="pj-name" placeholder="○○工程"></div>
    <div><label>工程地點</label><input id="pj-loc" placeholder="○○市○○區"></div>
    <div><label>承造廠商</label><input id="pj-contractor" placeholder="○○營造股份有限公司"></div>
    <div><label>文件編號</label><input id="pj-docno" placeholder="BSM-CAL-001"></div>
    <div><label>計算者</label><input id="pj-calc" placeholder="姓名"></div>
    <div><label>審核者</label><input id="pj-review" placeholder="姓名"></div>
    <div><label>計算日期</label><input id="pj-date" type="date"></div>
  </div>
</div>

<div class="grid">

  <div class="card">
    <h2>梁設定 Beam</h2>
    <label>梁型式</label>
    <select id="beamType" onchange="render()">
      <option value="simple">簡支梁 (Simply Supported)</option>
      <option value="cantilever">懸臂梁 (Cantilever, 固定於左端)</option>
    </select>
    <label>梁長 L (m)</label>
    <input id="L" type="number" value="6" step="0.1" onchange="render()">

    <h2 style="margin-top:18px;">載重 Loads</h2>
    <div id="loadsContainer"></div>
    <div class="row2">
      <button onclick="addLoad('point')">+ 點載重</button>
      <button onclick="addLoad('udl')">+ 均布載重</button>
    </div>

    <div class="result" id="result"></div>
    <details class="proc" id="proc" style="display:none">
      <summary>📋 計算過程（供第三方檢核）</summary>
      <pre id="proc-text"></pre>
    </details>
  </div>

  <div class="card">
    <h2>內力圖 Diagrams</h2>
    <svg id="chart" viewBox="0 0 700 560"></svg>
  </div>

</div>
</main>

<script>
let loads = [];
let idCounter = 0;

function addLoad(type){
  const id = idCounter++;
  if(type==='point') loads.push({id, type:'point', P:10, a:3});
  else loads.push({id, type:'udl', w:5, a1:0, a2:6});
  renderLoadRows();
  render();
}
function removeLoad(id){
  loads = loads.filter(l=>l.id!==id);
  renderLoadRows();
  render();
}
function updateLoad(id, key, val){
  const l = loads.find(l=>l.id===id);
  if(l) l[key] = parseFloat(val);
  render();
}

function renderLoadRows(){
  const c = document.getElementById('loadsContainer');
  c.innerHTML = '';
  loads.forEach(l=>{
    const div = document.createElement('div');
    div.className = 'loadRow';
    if(l.type==='point'){
      div.innerHTML = `
        <button class="del" onclick="removeLoad(${l.id})">×</button>
        <div style="font-size:12.5px; font-weight:600; color:#0b1f3a; margin-bottom:6px;">點載重 Point Load</div>
        <div class="row2">
          <div><label>P (kN, 向下為正)</label><input type="number" value="${l.P}" onchange="updateLoad(${l.id},'P',this.value)"></div>
          <div><label>位置 a (m, 從左端)</label><input type="number" value="${l.a}" onchange="updateLoad(${l.id},'a',this.value)"></div>
        </div>`;
    } else {
      div.innerHTML = `
        <button class="del" onclick="removeLoad(${l.id})">×</button>
        <div style="font-size:12.5px; font-weight:600; color:#0b1f3a; margin-bottom:6px;">均布載重 UDL</div>
        <div class="row3">
          <div><label>w (kN/m)</label><input type="number" value="${l.w}" onchange="updateLoad(${l.id},'w',this.value)"></div>
          <div><label>起點 a1 (m)</label><input type="number" value="${l.a1}" onchange="updateLoad(${l.id},'a1',this.value)"></div>
          <div><label>終點 a2 (m)</label><input type="number" value="${l.a2}" onchange="updateLoad(${l.id},'a2',this.value)"></div>
        </div>`;
    }
    c.appendChild(div);
  });
}

// compute reactions, then V(x), M(x) sampled along beam
function computeDiagram(){
  const type = document.getElementById('beamType').value;
  const L = parseFloat(document.getElementById('L').value);
  const N = 400;
  const xs = Array.from({length:N+1}, (_,i)=>L*i/N);

  let RA=0, RB=0, MA=0; // RA at x=0, RB at x=L (simple) ; MA = fixed moment at x=0 (cantilever)
  // total load and moment about x=0 for simple beam reactions
  let totalP = 0, momAbout0 = 0;
  loads.forEach(l=>{
    if(l.type==='point'){
      totalP += l.P;
      momAbout0 += l.P*l.a;
    } else {
      const w=l.w, a1=Math.min(l.a1,l.a2), a2=Math.max(l.a1,l.a2);
      const len=a2-a1, R=w*len, cx=(a1+a2)/2;
      totalP += R;
      momAbout0 += R*cx;
    }
  });

  if(type==='simple'){
    RB = momAbout0/L;
    RA = totalP - RB;
  } else {
    RA = totalP; // cantilever: all reaction at fixed end x=0
    MA = momAbout0; // reaction moment at fixed end
  }

  function shearAt(x){
    let V = type==='simple' ? RA : RA;
    loads.forEach(l=>{
      if(l.type==='point'){
        if(x > l.a) V -= l.P;
      } else {
        const a1=Math.min(l.a1,l.a2), a2=Math.max(l.a1,l.a2);
        if(x > a1){
          const xe = Math.min(x,a2);
          V -= l.w*(xe-a1);
        }
      }
    });
    return V;
  }
  function momentAt(x){
    let M = type==='simple' ? RA*x : RA*x - MA;
    loads.forEach(l=>{
      if(l.type==='point'){
        if(x > l.a) M -= l.P*(x-l.a);
      } else {
        const a1=Math.min(l.a1,l.a2), a2=Math.max(l.a1,l.a2);
        if(x > a1){
          const xe = Math.min(x,a2);
          const len = xe-a1;
          M -= l.w*len*(x-(a1+xe)/2);
        }
      }
    });
    return M;
  }

  const Vs = xs.map(shearAt);
  const Ms = xs.map(momentAt);
  return {xs, Vs, Ms, RA, RB, MA, type, L, totalP, momAbout0};
}

function showProc(text){ document.getElementById('proc-text').textContent = text; document.getElementById('proc').style.display = ''; }
function hideProc(){ document.getElementById('proc').style.display = 'none'; }

function shearAtExplain(x, RA, type, loads){
  let V = RA;
  const lines = ['V('+x.toFixed(2)+') = RA = '+RA.toFixed(2)+' kN'];
  loads.forEach((l,i)=>{
    if(l.type==='point'){
      if(x > l.a){ V -= l.P; lines.push('  − #'+(i+1)+' P = '+l.P+' kN（作用於 a='+l.a+' m ≤ x）'); }
    } else {
      const a1=Math.min(l.a1,l.a2), a2=Math.max(l.a1,l.a2);
      if(x > a1){
        const xe = Math.min(x,a2);
        const contrib = l.w*(xe-a1);
        V -= contrib;
        lines.push('  − #'+(i+1)+' w×(x範圍)= '+l.w+'×('+xe.toFixed(2)+'−'+a1+') = '+contrib.toFixed(2)+' kN');
      }
    }
  });
  lines.push('  → V('+x.toFixed(2)+') = '+V.toFixed(2)+' kN');
  return {value:V, lines};
}

function momentAtExplain(x, RA, MA, type, loads){
  let M = type==='simple' ? RA*x : RA*x - MA;
  const base = type==='simple'
    ? 'RA×x = '+RA.toFixed(2)+'×'+x.toFixed(2)
    : 'RA×x − MA = '+RA.toFixed(2)+'×'+x.toFixed(2)+' − '+MA.toFixed(2);
  const lines = ['M('+x.toFixed(2)+') = '+base+' = '+M.toFixed(2)+' kN·m（未計入跨內載重前）'];
  loads.forEach((l,i)=>{
    if(l.type==='point'){
      if(x > l.a){ const c=l.P*(x-l.a); M -= c; lines.push('  − #'+(i+1)+' P×(x−a) = '+l.P+'×('+x.toFixed(2)+'−'+l.a+') = '+c.toFixed(2)+' kN·m'); }
    } else {
      const a1=Math.min(l.a1,l.a2), a2=Math.max(l.a1,l.a2);
      if(x > a1){
        const xe=Math.min(x,a2), len=xe-a1, cx=(a1+xe)/2;
        const c = l.w*len*(x-cx);
        M -= c;
        lines.push('  − #'+(i+1)+' w×len×(x−形心) = '+l.w+'×'+len.toFixed(2)+'×('+x.toFixed(2)+'−'+cx.toFixed(2)+') = '+c.toFixed(2)+' kN·m');
      }
    }
  });
  lines.push('  → M('+x.toFixed(2)+') = '+M.toFixed(2)+' kN·m');
  return {value:M, lines};
}

function render(){
  const d = computeDiagram();
  drawChart(d);

  let maxV=-Infinity, minV=Infinity, maxM=-Infinity, minM=Infinity, xMaxV=0, xMaxM=0, xMinM=0;
  d.xs.forEach((x,i)=>{
    if(d.Vs[i]>maxV){maxV=d.Vs[i]; xMaxV=x;}
    if(d.Vs[i]<minV){minV=d.Vs[i];}
    if(d.Ms[i]>maxM){maxM=d.Ms[i]; xMaxM=x;}
    if(d.Ms[i]<minM){minM=d.Ms[i]; xMinM=x;}
  });

  const res = document.getElementById('result');
  let html = '<table>';
  if(d.type==='simple'){
    html += `<tr><td>支承反力 RA (左)</td><td>${d.RA.toFixed(2)} kN</td></tr>`;
    html += `<tr><td>支承反力 RB (右)</td><td>${d.RB.toFixed(2)} kN</td></tr>`;
  } else {
    html += `<tr><td>固定端反力 RA</td><td>${d.RA.toFixed(2)} kN</td></tr>`;
    html += `<tr><td>固定端反力彎矩 MA</td><td>${d.MA.toFixed(2)} kN·m</td></tr>`;
  }
  html += `<tr><td>最大剪力 Vmax</td><td>${maxV.toFixed(2)} kN (x=${xMaxV.toFixed(2)} m)</td></tr>`;
  html += `<tr><td>最小剪力 Vmin</td><td>${minV.toFixed(2)} kN</td></tr>`;
  html += `<tr><td>最大彎矩 Mmax</td><td>${maxM.toFixed(2)} kN·m (x=${xMaxM.toFixed(2)} m)</td></tr>`;
  html += `<tr><td>最小彎矩 Mmin</td><td>${minM.toFixed(2)} kN·m (x=${xMinM.toFixed(2)} m)</td></tr>`;
  html += '</table>';
  res.innerHTML = html;

  if(!loads.length){ hideProc(); return; }

  const lines = [];
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('  梁剪力彎矩計算過程（靜力平衡法）');
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('');
  lines.push('【輸入】'+(d.type==='simple'?'簡支梁':'懸臂梁（固定於左端）')+'，L = '+d.L+' m');
  loads.forEach((l,i)=>{
    if(l.type==='point') lines.push('  #'+(i+1)+' 點載重 P = '+l.P+' kN @ a = '+l.a+' m');
    else lines.push('  #'+(i+1)+' 均布載重 w = '+l.w+' kN/m，範圍 ['+Math.min(l.a1,l.a2)+', '+Math.max(l.a1,l.a2)+'] m');
  });
  lines.push('');
  lines.push('【一】反力計算（靜力平衡）');
  lines.push('  ΣM(x=0) 各項貢獻：');
  loads.forEach((l,i)=>{
    if(l.type==='point') lines.push('   #'+(i+1)+'：P×a = '+l.P+'×'+l.a+' = '+(l.P*l.a).toFixed(2)+' kN·m');
    else {
      const a1=Math.min(l.a1,l.a2), a2=Math.max(l.a1,l.a2), len=a2-a1, R=l.w*len, cx=(a1+a2)/2;
      lines.push('   #'+(i+1)+'：合力 R=w×len = '+l.w+'×'+len.toFixed(2)+' = '+R.toFixed(2)+' kN @ 形心 '+cx.toFixed(2)+' m → 力矩 = '+(R*cx).toFixed(2)+' kN·m');
    }
  });
  lines.push('  ΣM(x=0) = '+d.momAbout0.toFixed(2)+' kN·m；ΣP = '+d.totalP.toFixed(2)+' kN');
  if(d.type==='simple'){
    lines.push('  RB = ΣM/L = '+d.momAbout0.toFixed(2)+'/'+d.L+' = '+d.RB.toFixed(2)+' kN');
    lines.push('  RA = ΣP − RB = '+d.totalP.toFixed(2)+' − '+d.RB.toFixed(2)+' = '+d.RA.toFixed(2)+' kN');
  } else {
    lines.push('  RA = ΣP = '+d.totalP.toFixed(2)+' kN（固定端垂直反力）');
    lines.push('  MA = ΣM(x=0) = '+d.momAbout0.toFixed(2)+' kN·m（固定端反力彎矩）');
  }
  lines.push('');
  lines.push('【二】關鍵斷面 V(x)、M(x)（取各載重位置與極值位置）');
  const stationSet = new Set([0, d.L, xMaxV, xMaxM, xMinM].map(v=>Math.round(v*1000)/1000));
  loads.forEach(l=>{
    if(l.type==='point') stationSet.add(Math.round(l.a*1000)/1000);
    else { stationSet.add(Math.round(l.a1*1000)/1000); stationSet.add(Math.round(l.a2*1000)/1000); }
  });
  const stations = Array.from(stationSet).filter(x=>x>=0 && x<=d.L).sort((a,b)=>a-b);
  stations.forEach(x=>{
    const vE = shearAtExplain(x, d.RA, d.type, loads);
    const mE = momentAtExplain(x, d.RA, d.MA, d.type, loads);
    lines.push('  '+vE.lines.join('\n  '));
    lines.push('  '+mE.lines.join('\n  '));
    lines.push('');
  });
  lines.push('【三】最大值摘要');
  lines.push('  Vmax = '+maxV.toFixed(2)+' kN @ x='+xMaxV.toFixed(2)+' m　Vmin = '+minV.toFixed(2)+' kN');
  lines.push('  Mmax = '+maxM.toFixed(2)+' kN·m @ x='+xMaxM.toFixed(2)+' m　Mmin = '+minM.toFixed(2)+' kN·m @ x='+xMinM.toFixed(2)+' m');
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  showProc(lines.join('\n'));
}

function drawChart(d){
  const svg = document.getElementById('chart');
  svg.innerHTML = '';
  const svgns = "http://www.w3.org/2000/svg";
  function el(tag,attrs){
    const e = document.createElementNS(svgns,tag);
    for(const k in attrs) e.setAttribute(k,attrs[k]);
    return e;
  }
  const W=700, H=560, ml=60, mr=20;
  const beamY=40, beamW=W-ml-mr;
  const vTop=110, vH=180, mTop=320, mH=200;

  // beam line
  svg.appendChild(el('line',{x1:ml,y1:beamY,x2:ml+beamW,y2:beamY,stroke:'#0b1f3a','stroke-width':4}));
  svg.appendChild(el('text',{x:ml,y:beamY-12,'font-size':12,fill:'#555'})).textContent=`L = ${d.L} m (${d.type==='simple'?'簡支梁':'懸臂梁'})`;

  function xPix(x){ return ml + (x/d.L)*beamW; }

  // Shear diagram
  svg.appendChild(el('line',{x1:ml,y1:vTop+vH/2,x2:ml+beamW,y2:vTop+vH/2,stroke:'#999'}));
  svg.appendChild(el('text',{x:ml,y:vTop-10,'font-size':12,fill:'#555','font-weight':'bold'})).textContent='剪力圖 Shear V(x)';
  const maxAbsV = Math.max(...d.Vs.map(Math.abs), 1);
  let pathV = '';
  d.xs.forEach((x,i)=>{
    const px = xPix(x);
    const py = vTop+vH/2 - (d.Vs[i]/maxAbsV)*(vH/2-10);
    pathV += (i===0?'M':'L') + px + ',' + py + ' ';
  });
  svg.appendChild(el('path',{d:pathV, fill:'none', stroke:'#c9a14a', 'stroke-width':2}));

  // Moment diagram
  svg.appendChild(el('line',{x1:ml,y1:mTop+mH/2,x2:ml+beamW,y2:mTop+mH/2,stroke:'#999'}));
  svg.appendChild(el('text',{x:ml,y:mTop-10,'font-size':12,fill:'#555','font-weight':'bold'})).textContent='彎矩圖 Moment M(x)';
  const maxAbsM = Math.max(...d.Ms.map(Math.abs), 1);
  let pathM = '';
  d.xs.forEach((x,i)=>{
    const px = xPix(x);
    const py = mTop+mH/2 - (d.Ms[i]/maxAbsM)*(mH/2-10);
    pathM += (i===0?'M':'L') + px + ',' + py + ' ';
  });
  svg.appendChild(el('path',{d:pathM, fill:'none', stroke:'#0b1f3a', 'stroke-width':2}));

  svg.appendChild(el('text',{x:ml,y:H-10,'font-size':11,fill:'#999'})).textContent='x (m) →';
}

addLoad('point');
addLoad('udl');
render();
</script>
